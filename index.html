<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyên Đề Word Formation Chuyên Anh - Ms Lê Hằng English</title>
    <!-- Tích hợp Google Fonts tròn trịa phong cách Duolingo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #A8E6CF, #DCEDC1, #FFD3B6, #FFAAA5, #FF8B94);
            --correct-color: #00D26A;
            --wrong-color: #FF4757;
            --text-main: #2D3436;
            --card-bg: rgba(255, 255, 255, 0.96);
            --purple-accent: #8854C0;
        }

        body {
            font-family: 'Quicksand', 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-main);
            background: var(--primary-gradient);
            background-size: 400% 400%;
            animation: loangMauNenChuyenDong 25s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes loangMauNenChuyenDong {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .pattern-overlay-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><g fill='%23FFFFFF'><path d='M20,20 L26,32 L38,34 L29,42 L32,54 L20,47 L8,54 L11,42 L2,34 L14,32 Z'/><circle cx='120' cy='40' r='10'/><path d='M40,110 C40,98 60,92 80,104 C100,92 120,98 120,110 C120,122 40,122 40,110 Z' opacity='0.6'/><path d='M130,120 Q142,102 154,120 T166,120' stroke='%23FFFFFF' stroke-width='3' fill='none'/></g></svg>");
            animation: movingBackgroundPattern 45s linear infinite;
        }

        @keyframes movingBackgroundPattern {
            from { background-position: 0 0; }
            to { background-position: 320px 640px; }
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            background: rgba(255, 255, 255, 0.94);
            padding: 8px 20px;
            border-radius: 14px;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            border: 2px solid var(--purple-accent);
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
        }

        header h1 {
            font-size: 1rem;
            color: var(--purple-accent);
            margin: 0;
            font-weight: 900;
        }

        .important-notice-box {
            background: #FFF9E6;
            border: 4px dashed #FDCB6E;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 rgba(253, 203, 110, 0.2);
            text-align: center;
        }

        .notice-title {
            font-size: 1.15rem;
            font-weight: 900;
            color: #D35400;
            margin-bottom: 6px;
            display: block;
        }

        .notice-content {
            font-size: 1rem;
            line-height: 1.5;
            color: #2D3436;
            font-weight: 700;
        }

        .section-title-banner {
            background: #FFF;
            padding: 12px 20px;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--purple-accent);
            margin-top: 35px;
            margin-bottom: 15px;
            border-left: 6px solid #E84393;
            box-shadow: 0 4px 0 rgba(0,0,0,0.04);
        }

        /* CARD TRẮC NGHIỆM */
        .quiz-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 22px;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.05);
            border: 3px solid #FFF;
            position: relative;
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .question-number {
            background: var(--purple-accent);
            color: #FFF;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            font-size: 0.95rem;
            box-shadow: 0 4px 0 #6c3da3;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.6;
            color: var(--text-main);
            margin-top: 2px;
        }

        .choices-grid {
            display: flex;
            flex-direction: column;
            margin-top: 15px;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            width: 100%;
            background: #FFF;
            border: 3px solid #E2E8F0;
            border-radius: 18px;
            padding: 12px 18px;
            margin-bottom: 10px;
            font-size: 1.02rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            color: var(--text-main);
            box-shadow: 0 6px 0 #E2E8F0;
            transition: all 0.1s ease;
        }

        .choice-btn:hover:not(:disabled) {
            transform: scale(1.01) translateY(-2px);
            border-color: #B2BEC3;
            box-shadow: 0 8px 0 #B2BEC3;
        }

        .choice-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #B2BEC3;
        }

        .choice-prefix {
            background: #F1F5F9;
            border-radius: 10px;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 12px;
            color: #64748B;
            flex-shrink: 0;
        }

        .choice-btn.correct-state {
            background-color: #E6FBF1 !important;
            border-color: var(--correct-color) !important;
            box-shadow: 0 6px 0 #00A955 !important;
            color: #006633 !important;
        }

        .choice-btn.correct-state .choice-prefix {
            background-color: var(--correct-color) !important;
            color: white !important;
        }

        .choice-btn.wrong-state {
            background-color: #FFEBEB !important;
            border-color: var(--wrong-color) !important;
            box-shadow: 0 6px 0 #D63031 !important;
            color: #99222A !important;
        }

        .choice-btn.wrong-state .choice-prefix {
            background-color: var(--wrong-color) !important;
            color: white !important;
        }

        .shake-animation {
            animation: shakeEffect 0.4s ease-in-out;
        }

        @keyframes shakeEffect {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* KHUNG GIẢI THÍCH 4 BƯỚC */
        .explanation-box {
            margin-top: 18px;
            background: #F8F9FA;
            border-radius: 18px;
            padding: 18px;
            border-left: 6px solid var(--purple-accent);
            display: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.04);
        }

        .explanation-title {
            font-weight: 900;
            color: var(--purple-accent);
            font-size: 1.05rem;
            margin-bottom: 10px;
        }

        .explanation-step {
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4A5568;
        }

        .step-heading {
            font-weight: 900;
            color: #2D3748;
            margin-bottom: 2px;
        }

        .footer-action-wrapper {
            text-align: center;
            margin: 40px 0;
        }

        .submit-exam-btn {
            background: #00D26A;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 16px 60px;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #00A955, 0 12px 25px rgba(0,0,0,0.12);
            font-family: inherit;
            transition: all 0.15s;
        }

        .submit-exam-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 11px 0 #00A955, 0 15px 30px rgba(0,0,0,0.18);
        }

        .submit-exam-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #00A955;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-body-card {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 4px solid var(--purple-accent);
            transform: scale(0.8);
            transition: all 0.25s ease;
        }

        .modal-overlay.active .modal-body-card {
            transform: scale(1);
        }

        .modal-header-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--purple-accent);
            margin-bottom: 10px;
        }

        .modal-score-badge {
            font-size: 3.5rem;
            font-weight: 900;
            color: #00D26A;
            margin: 15px 0;
        }

        .modal-comment-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #2D3436;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .modal-reload-btn {
            background: var(--purple-accent);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 0 #6c3da3;
        }

        #canvas-confetti-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="pattern-overlay-layer"></div>
    <canvas id="canvas-confetti-layer"></canvas>

    <div class="container">
        <header>
            <h1>Giáo viên tạo: Ms Lê Hằng English</h1>
        </header>

        <div class="important-notice-box">
            <span class="notice-title">⚠️ LỜI NHẮC QUAN TRỌNG CỦA CÔ LÊ HẰNG ⚠️</span>
            <span class="notice-content">
                Mỗi câu hỏi Word Formation dưới đây đều được trích thẳng từ đề thi chuyên Anh thực tế.<br>
                Hãy suy nghĩ thật kỹ về từ loại (Danh, Tính, Động, Trạng) cần điền trước khi bấm chọn nhé!
            </span>
        </div>

        <div id="quiz-dynamic-render-target"></div>

        <div class="footer-action-wrapper">
            <button class="submit-exam-btn" onclick="processExamGrading()">🎉 NỘP BÀI KIỂM TRA 🎉</button>
        </div>
    </div>

    <div class="modal-overlay" id="result-summary-popup">
        <div class="modal-body-card">
            <div class="modal-header-title">🏆 KẾT QUẢ ĐẠT ĐƯỢC 🏆</div>
            <div class="modal-score-badge" id="score-counter-slot">0/0</div>
            <div class="modal-comment-text" id="teacher-feedback-slot">Lời khuyên...</div>
            <button class="modal-reload-btn" onclick="resetAndRestartQuiz()">THỬ SỨC LẠI</button>
        </div>
    </div>

    <script>
        const questionsDatabase = [
            // CẦN THƠ (51 - 55)
            {
                id: 51,
                section: "Đề Thi Tuyển Sinh Vào Lớp 10 Chuyên Anh Tỉnh Cần Thơ",
                text: "My mother is a _______ (CARE) woman. She always takes care of us.",
                choices: [
                    { text: "caring (chu đáo, biết quan tâm)", key: "A" },
                    { text: "careful (cẩn thận)", key: "B" },
                    { text: "careless (cẩu thả)", key: "C" },
                    { text: "care (sự chăm sóc)", key: "D" }
                ],
                correct: "A",
                explanation: {
                    step1: "Dịch nghĩa: Mẹ tôi là một người phụ nữ chu đáo. Bà ấy luôn chăm sóc chúng tôi.",
                    step2: "Vị trí trống đứng trước danh từ 'woman' nên cần một tính từ bổ nghĩa.",
                    step3: "Vế sau có thông tin 'always takes care of us' (luôn chăm sóc chúng tôi) bộc lộ tính cách chu đáo, yêu thương, do đó chọn tính từ 'caring'.",
                    step4: "'careful' là cẩn thận tránh nguy hiểm; 'careless' mang nghĩa tiêu cực (cẩu thả); 'care' là danh từ/động từ không phù hợp."
                }
            },
            {
                id: 52,
                section: "Đề Thi Tuyển Sinh Vào Lớp 10 Chuyên Anh Tỉnh Cần Thơ",
                text: "We often take part in English writing _______ (COMPETE) at school.",
                choices: [
                    { text: "competitions (các cuộc thi)", key: "A" },
                    { text: "competitive (mang tính cạnh tranh)", key: "B" },
                    { text: "competitors (những người thi đấu)", key: "C" },
                    { text: "competitiveness (tính cạnh tranh)", key: "D" }
                ],
                correct: "A",
                explanation: {
                    step1: "Dịch nghĩa: Chúng tôi thường tham gia vào các cuộc thi viết tiếng Anh ở trường.",
                    step2: "Sau cụm danh từ 'English writing' cần một danh từ số nhiều để tạo thành cụm danh từ chỉ hoạt động, sự kiện số nhiều sau 'take part in'.",
                    step3: "Từ gốc 'COMPETE' (thi đấu) chuyển thành danh từ chỉ cuộc thi số nhiều là 'competitions'.",
                    step4: "'competitors' là thí sinh; 'competitive' là tính từ; 'competitiveness' là danh từ chỉ đặc tính cạnh tranh."
                }
            },
            {
                id: 53,
                section: "Đề Thi Tuyển Sinh Vào Lớp 10 Chuyên Anh Tỉnh Cần Thơ",
                text: "The _______ (COVER) of the internet was made in 20th century.",
                choices: [
                    { text: "discovery (sự khám phá, phát hiện)", key: "A" },
                    { text: "coverage (việc đưa tin, phủ sóng)", key: "B" },
                    { text: "discover (khám phá)", key: "C" },
                    { text: "recovering (sự phục hồi)", key: "D" }
                ],
                correct: "A",
                explanation: {
                    step1: "Dịch nghĩa: Sự phát hiện/phát minh ra mạng Internet được thực hiện vào thế kỷ 20.",
                    step2: "Đứng sau mạo từ 'The' và trước giới từ 'of' bắt buộc phải là một danh từ.",
                    step3: "Mặc dù đề bài cho gốc từ gốc 'COVER', nhưng đây là một câu bẫy kinh điển của đề chuyên, gốc chuẩn phải hướng tới từ 'discover' -> danh từ 'discovery' để hợp ngữ cảnh lịch sử khoa học.",
                    step4: "'coverage' là độ phủ sóng/đưa tin báo chí không phù hợp ngữ cảnh phát minh ra đời."
                }
            },
            {
                id: 54,
                section: "Đề Thi Tuyển Sinh Vào Lớp 10 Chuyên Anh Tỉnh Cần Thơ",
                text: "I shouted at the dog and it walked away _______ (OPPOINT).",
                choices: [
                    { text: "disappointedly (một cách thất vọng)", key: "A" },
                    { text: "disappointed (bị thất vọng)", key: "B" },
                    { text: "disappointing (gây thất vọng)", key: "C" },
                    { text: "appointment (cuộc hẹn)", key: "D" }
                ],
                correct: "A",
                explanation: {
                    step1: "Dịch nghĩa: Tôi quát con chó và nó bỏ đi một cách đầy thất vọng.",
                    step2: "Vị trí cuối câu bổ nghĩa cho động từ hành động 'walked away' nên cần một trạng từ (adverb).",
                    step3: "Từ gốc 'OPPOINT' trong đề là lỗi đánh máy từ gốc gốc 'APPOINT/DISAPPOINT'. Ta biến đổi thành trạng từ 'disappointedly' để diễn tả trạng thái của con vật khi bỏ đi.",
                    step4: "Các từ còn lại là tính từ hoặc danh từ không thể bổ nghĩa cho động từ hành động."
                }
            },
            {
                id: 55,
                section: "Đề Thi Tuyển Sinh Vào Lớp 10 Chuyên Anh Tỉnh Cần Thơ",
                text: "He lost both his house and his _______ (LIVE) because of the storm.",
                choices: [
                    { text: "livelihood (kế sinh nhai, nguồn sống)", key: "A" },
                    { text: "living (cuộc sống)", key: "B" },
                    { text: "liveliness (sự sống động)", key: "C" },
                    { text: "alive (còn sống)", key: "D" }
                ],
                correct: "A",
                explanation: {
                    step1: "Dịch nghĩa: Anh ấy mất cả nhà cửa lẫn kế sinh nhai vì cơn bão dữ dội.",
                    step2: "Sau tính từ sở hữu 'his' cần một danh từ chỉ tài sản, vật sở hữu tương đương với danh từ 'house'.",
                    step3: "Từ gốc 'LIVE' biến đổi thành danh từ 'livelihood' mang ý nghĩa là nguồn sống, phương tiện kiếm sống của con người.",
                    step4: "'living' thường dùng trong cụm 'earn a living'; 'liveliness' là sự hoạt bát sôi nổi không hợp ngữ cảnh mất mát do bão."
                }
            },

            // ĐÀ NẴNG (56 - 60)
            {
                id: 56,
                section: "Đề Thi Tuyển Sinh Vào Lớp 10 Chuyên Anh TP. Đà Nẵng",
                text: "The accident happened because he drove _______ (CARE).",
                choices: [
                    { text: "carelessly (một cách bất cẩn)", key: "A" },
                    { text: "carefully (một cách cẩn thận)", key: "B" },
                    { text: "careless (bất cẩn)", key: "C" },
                    { text: "careful (cẩn thận)", key: "D" }
                ],
                correct: "A",
                explanation: {
                    step1: "Dịch nghĩa: Tai nạn xảy ra bởi vì anh ta lái xe một cách bất cẩn.",
                    step2: "Đứng sau và bổ nghĩa cho động từ thường 'drove' phải là một trạng từ.",
                    step3: "Vì kết quả dẫn đến tai nạn ('accident happened') nên trạng từ phải mang nghĩa tiêu cực: 'carelessly'.",
                    step4: "'carefully' ngược nghĩa; 'careless' và 'careful' là tính từ."
                }
            },
            {
                id: 57,
                section: "Đề Thi Tuyển Sinh Vào Lớp 10 Chuyên Anh TP. Đà Nẵng",
                text: "Air _______ (POLLUTE) is one of the problems that people have to deal with.",
                choices: [
                    { text: "pollution (sự ô nhiễm)", key: "A" },
                    { text: "pollutant (chất gây ô nhiễm)", key: "B" },
                    { text: "polluted (bị ô nhiễm)", key: "C" },
                    { text: "polluting (gây ô nhiễm)", key: "D" }
                ],
                correct: "A",
                explanation: {
                    step1: "Dịch nghĩa: Ô nhiễm không khí là một trong những vấn đề con người phải đối mặt.",
                    step2: "Đứng đầu câu làm chủ ngữ chính kết hợp với từ 'Air' tạo thành danh từ ghép chỉ hiện tượng.",
                    step3: "Từ gốc 'POLLUTE' chuyển thành danh từ chỉ sự ô nhiễm là 'pollution'.",
                    step4: "'pollutant' là chất gây ô nhiễm cụ thể (số ít); 'polluted' là tính từ phân từ."
                }
            },
            {
                id: 58,
                section: "Đề Thi Tuyển Sinh Vào Lớp 10 Chuyên Anh TP. Đà Nẵng",
                text: "Traditional _______ (CELEBRATE) are a good source of fun and entertainment.",
                choices: [
                    { text: "celebrations (các lễ kỷ niệm, lễ hội)", key: "A" },
                    { text: "celebration (lễ kỷ niệm số ít)", key: "B" },
                    { text: "celebrities (những người nổi tiếng)", key: "C" },
                    { text: "celebrated (nổi tiếng)", key: "D" }
                ],
                correct: "A",

        let trackedStudentAnswers = {};
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playDingSound() {
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.16); // G5
                osc.frequency.setValueAtTime(1046.50, now + 0.24); // C6
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.22, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.5);
            } catch(e) {}
        }

        function playBuzzSound() {
            try {
                const now = audioCtx.currentTime;
                const frequencies = [392.00, 349.23, 261.63]; // Âm hạ bậc "Téo teo tèo"
                frequencies.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + (idx * 0.12));
                    gain.gain.setValueAtTime(0, now + (idx * 0.12));
                    gain.gain.linearRampToValueAtTime(0.18, now + (idx * 0.12) + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + (idx * 0.12) + 0.14);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + (idx * 0.12)); osc.stop(now + (idx * 0.12) + 0.14);
                });
            } catch(e) {}
        }

        function runConfettiExplosion() {
            const canvas = document.getElementById('canvas-confetti-layer');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            
            let particles = [];
            const paletteColors = ['#FFC107', '#FF5722', '#E91E63', '#9C27B0', '#00C9A7', '#00D26A', '#8854C0'];
            
            for (let i = 0; i < 75; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    radius: Math.random() * 4 + 4,
                    density: Math.random() * canvas.height,
                    color: paletteColors[Math.floor(Math.random() * paletteColors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltIncremental: Math.random() * 0.05 + 0.02,
                    angle: 0
                });
            }
            
            function animateConfettiFrame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let continueAnimation = false;
                particles.forEach((p) => {
                    p.angle += p.tiltIncremental;
                    p.y += (Math.cos(p.density) + 3 + p.radius / 2) / 1.8;
                    p.x += Math.sin(p.angle);
                    if (p.y <= canvas.height) continueAnimation = true;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });
                if (continueAnimation) requestAnimationFrame(animateConfettiFrame);
            }
            animateConfettiFrame();
        }

        function shuffleArrayChoices(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }

        function buildAndRenderInterface() {
            const quizTarget = document.getElementById('quiz-dynamic-render-target');
            quizTarget.innerHTML = '';
            
            let currentSectionTitle = "";

            questionsDatabase.forEach((q, idx) => {
                if (currentSectionTitle !== q.section) {
                    currentSectionTitle = q.section;
                    const headline = document.createElement('div');
                    headline.className = 'section-title-banner';
                    headline.innerText = currentSectionTitle;
                    quizTarget.appendChild(headline);
                }

                const cardNode = document.createElement('div');
                cardNode.className = 'quiz-card';
                cardNode.id = `card-wrapper-id-${q.id}`;
                
                let shuffledChoices = [...q.choices];
                shuffleArrayChoices(shuffledChoices);
                
                let choicesHtmlContent = '';
                shuffledChoices.forEach(choice => {
                    choicesHtmlContent += `
                        <button class="choice-btn" id="btn-choice-item-${q.id}-${choice.key}" onclick="evaluateUserChoice(${q.id}, '${choice.key}', '${q.correct}')">
                            <span class="choice-prefix">${choice.key}</span>
                            <span class="choice-body-text">${choice.text}</span>
                        </button>
                    `;
                });

                cardNode.innerHTML = `
                    <div class="question-header">
                        <div class="question-number">${idx + 51}</div>
                        <div class="question-text">${q.text}</div>
                    </div>
                    <div class="choices-grid" id="choices-grid-box-id-${q.id}">
                        ${choicesHtmlContent}
                    </div>
                    
                    <div class="explanation-box" id="explanation-box-view-id-${q.id}">
                        <div class="explanation-title">💡 GIẢI THÍCH CHI TIẾT TỪ CÔ LÊ HẰNG:</div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 1: Dịch nghĩa câu hỏi gốc</div>
                            <div>${q.explanation.step1}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 2: Xác định từ loại cần điền</div>
                            <div>${q.explanation.step2}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 3: Tại sao đáp án này ĐÚNG?</div>
                            <div style="font-weight: 700; color: #00A955;">${q.explanation.step3}</div>
                        </div>
                        <div class="explanation-step">
                            <div class="step-heading">🔹 Bước 4: Tại sao các phương án khác SAI?</div>
                            <div>${q.explanation.step4}</div>
                        </div>
                    </div>
                `;
                quizTarget.appendChild(cardNode);
            });
        }

        function evaluateUserChoice(questionId, chosenKey, correctKey) {
            if (trackedStudentAnswers[questionId] !== undefined) return;
            
            trackedStudentAnswers[questionId] = chosenKey;
            const targetBtnNode = document.getElementById(`btn-choice-item-${questionId}-${chosenKey}`);
            const correctBtnNode = document.getElementById(`btn-choice-item-${questionId}-${correctKey}`);
            const parentCardNode = document.getElementById(`card-wrapper-id-${questionId}`);
            
            if (chosenKey === correctKey) {
                targetBtnNode.classList.add('correct-state');
                playDingSound();
                runConfettiExplosion();
            } else {
                targetBtnNode.classList.add('wrong-state');
                if (correctBtnNode) correctBtnNode.classList.add('correct-state');
                parentCardNode.classList.add('shake-animation');
                playBuzzSound();
                setTimeout(() => parentCardNode.classList.remove('shake-animation'), 450);
            }

            const childrenButtons = document.getElementById(`choices-grid-box-id-${questionId}`).getElementsByClassName('choice-btn');
            for (let btn of childrenButtons) { btn.disabled = true; }

            document.getElementById(`explanation-box-view-id-${questionId}`).style.display = 'block';
        }

        function processExamGrading() {
            let correctCount = 0;
            const totalQuestionsCount = questionsDatabase.length;
            
            questionsDatabase.forEach(q => {
                if (trackedStudentAnswers[q.id] === q.correct) {
                    correctCount++;
                }
            });

            const rawSuccessPercentage = (correctCount / totalQuestionsCount) * 100;
            const scoreDisplaySlot = document.getElementById('score-counter-slot');
            const commentDisplaySlot = document.getElementById('teacher-feedback-slot');

            scoreDisplaySlot.innerText = `${correctCount} / ${totalQuestionsCount}`;

            if (rawSuccessPercentage < 50) {
                commentDisplaySlot.innerText = "Điểm chưa cao lắm, con nhớ đọc kỹ 4 bước giải thích của từng câu để học thêm từ vựng mới và làm lại nhé! Cô tin con sẽ làm tốt hơn! 💕";
            } else if (rawSuccessPercentage >= 50 && rawSuccessPercentage <= 85) {
                commentDisplaySlot.innerText = "Con làm bài rất khá! Hãy rà soát lại các câu làm sai, ghi lại cấu trúc vào vở để bứt phá điểm tuyệt đối lần sau nha! 🌟";
            } else {
                commentDisplaySlot.innerText = "Xuất sắc quá! Con có nền tảng từ vựng Chuyên Anh cực kỳ vững chắc. Hãy tiếp tục phát huy phong độ đỉnh cao này con nhé! 🎉💎";
            }

            document.getElementById('result-summary-popup').classList.add('active');
        }

        function resetAndRestartQuiz() {
            document.getElementById('result-summary-popup').classList.remove('active');
            trackedStudentAnswers = {};
            buildAndRenderInterface();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            buildAndRenderInterface();
        };
    </script>
</body>
</html>
